name: Build Custom Kubuntu ISO (using build.sh)

on:
  workflow_dispatch:      # позволяет запускать сборку вручную
  # push:
  #   branches: [ main ]    # можно запускать автоматически при пуше в main
  
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Клонируем репозиторий
      - name: Checkout repository
        uses: actions/checkout@v4

      # Запуск скрипта сборки
      - name: Run build.sh
        run: |
          chmod +x build.sh
          ./build.sh

      # Загружаем ISO как артефакт
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: custom-kubuntu-iso
          path: custom-kubuntu.iso
          if-no-files-found: error

      # Загружаем ISO в релиз (nightly)
      - name: Upload ISO to Nightly Release
        uses: ncipollo/release-action@v1
        with:
          tag: nightly
          name: Nightly Build
          artifacts: custom-kubuntu.iso
          allowUpdates: true      # разрешить обновление существующего релиза
          replacesArtifacts: true # заменять старый ISO новым
          token: ${{ secrets.GITHUB_TOKEN }}